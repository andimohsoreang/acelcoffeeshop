<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Offline - Coffee Shop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #fdfbf7;
            color: #1e293b;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 24px;
        }
        .icon {
            width: 80px;
            height: 80px;
            background-color: #fef3c7;
            color: #d97706;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .icon svg { width: 40px; height: 40px; }
        h1 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
            color: #0f172a;
        }
        p {
            font-size: 15px;
            color: #64748b;
            max-width: 320px;
            line-height: 1.5;
            margin-bottom: 32px;
        }
        .btn {
            background-color: #d97706;
            color: white;
            font-weight: 700;
            padding: 14px 28px;
            border-radius: 9999px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(217, 119, 6, 0.3);
        }
        .btn:active { transform: scale(0.96); }
        .btn svg { width: 20px; height: 20px; }
    </style>
</head>
<body>

    <div class="icon">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
            <!-- A customized offline slash icon -->
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M3 3l18 18"></path>
        </svg>
    </div>

    <h1>Oopss.. Anda Sedang Offline</h1>
    <p>Sepertinya Anda kehilangan koneksi internet. Silakan periksa jaringan Wi-Fi atau paket data Anda agar bisa kembali memesan kopi favorit.</p>

    <button class="btn" onclick="window.location.reload()">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
        </svg>
        Coba Hubungkan Kembali
    </button>

</body>
</html>
